services:
  sentinel_api:
    build: .
    container_name: sentinel_api
    ports:
      - "8000:8000"
    environment:
      # Databases
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=securevault_password
      - QDRANT_URL=http://qdrant:6333
      # Local LLM — host.docker.internal routes to the host machine where Docker Desktop AI runs
      - LLM_BASE_URL=http://host.docker.internal:12434/engines/llama.cpp/v1
      - LLM_MODEL_ID=ai/llama3.2:3B-Q4_K_M
      - LLM_API_KEY=unused
      - LLM_JSON_RETRIES=3
      # Hardware threshold (BGE-M3 + Reranker only; LLM is off-process)
      - MIN_VRAM_GB=4
      # Chunker
      - CHUNK_SIZE=1500
      - CHUNK_OVERLAP=150
    volumes:
      - ./.env:/app/.env
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - neo4j
      - qdrant
    # host.docker.internal is automatic on Docker Desktop (Windows/Mac).
    # On Linux Docker Engine it must be mapped explicitly via host-gateway.
    # host-gateway is silently ignored on Docker Desktop, so this is safe on all platforms.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  neo4j:
    image: neo4j:5.23.0
    container_name: securevault_neo4j
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/securevault_password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: securevault_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  qdrant_data:
  hf_cache: # HuggingFace model weights — shared, persistent across restarts
